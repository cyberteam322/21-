<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Letter for You</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="intro" id="introText">
      i hope you read this, even if it's too late.
    </div>

    <button class="btn" id="readBtn">Read it</button>

    <div class="letter" id="letterBox">
      <p id="typedText"></p>
      <span id="cursor">|</span>
    </div>

    <a id="waBtn" class="wa-btn" href="#" target="_blank">
      Send Message
    </a>

    <audio id="bgMusic">
      <source src="https://raw.githubusercontent.com/cyberteam322/Iris/main/Iris.mp3" type="audio/mpeg">
    </audio>

    <canvas id="bgCanvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
